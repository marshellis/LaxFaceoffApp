name: Publish (EAS)

# Cloud build (+ optional store submit) from CI so nobody needs signing keys on their laptop.
# Required GitHub secret: EXPO_TOKEN (expo.dev → Account settings → Access tokens).
# iOS signing + TestFlight submission use the Apple Distribution cert + App Store Connect API key
# already stored on EAS servers — no extra secret needed. (Android Play submission, when you want it,
# needs a Google Play service-account JSON added once via `eas credentials`.)
#
# Trigger: MANUAL ONLY (Actions tab → "Publish (EAS)" → Run workflow → pick profile + platform).
# Deliberately no auto-trigger on push/tags — the EAS Free plan includes only ~15 Android + 15 iOS
# builds/month, so a build must never fire by accident. Add a push/tags trigger later if you move to
# a paid plan or want release automation.
on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        type: choice
        default: preview
        options: [development, preview, production]
      platform:
        description: Platform
        type: choice
        default: all
        options: [android, ios, all]
      auto_submit:
        description: "Also submit to TestFlight / Play after building (use with profile=production)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Gate so the build doesn't ship broken code.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS build (+ optional submit)
        env:
          PROFILE: ${{ inputs.profile }}
          PLATFORM: ${{ inputs.platform }}
          AUTO_SUBMIT: ${{ inputs.auto_submit }}
        run: |
          ARGS="--profile $PROFILE --platform $PLATFORM --non-interactive --no-wait"
          if [ "$AUTO_SUBMIT" = "true" ]; then ARGS="$ARGS --auto-submit"; fi
          echo "Running: eas build $ARGS"
          eas build $ARGS
